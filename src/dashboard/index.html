<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lunabot Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #1a1a2e;
      color: #eee;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #00d4ff;
      margin-bottom: 20px;
      font-size: 28px;
    }

    .status {
      text-align: center;
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 20px;
      padding: 10px;
      border-radius: 8px;
    }

    .connected    { background: #1a3a1a; color: #00ff88; }
    .disconnected { background: #3a1a1a; color: #ff4444; }

    /* Mode selector */
    .mode-bar {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 25px;
    }

    .mode-btn {
      padding: 14px 40px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .mode-btn.manual {
      background: #2a4a7f;
      color: #fff;
    }

    .mode-btn.manual.active {
      background: #0077ff;
      color: #fff;
      box-shadow: 0 0 15px #0077ff;
    }

    .mode-btn.autonomous {
      background: #2a5a2a;
      color: #fff;
    }

    .mode-btn.autonomous.active {
      background: #00cc44;
      color: #fff;
      box-shadow: 0 0 15px #00cc44;
    }

    /* Mission state banner */
    .mission-banner {
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      background: #2a2a4a;
      color: #ffcc00;
      letter-spacing: 2px;
    }

    /* Grid layout */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .panel {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 10px;
      padding: 20px;
    }

    .panel h3 {
      color: #00d4ff;
      margin-bottom: 15px;
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stat {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #0f3460;
      font-size: 15px;
    }

    .stat span { color: #00d4ff; font-weight: bold; }

    /* Teleop buttons */
    .teleop-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      max-width: 220px;
      margin: 10px auto;
    }

    .teleop-btn {
      padding: 16px;
      font-size: 20px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #0f3460;
      color: #fff;
      transition: background 0.1s;
    }

    .teleop-btn:active { background: #0077ff; }
    .teleop-btn.stop   { background: #7f0000; }
    .teleop-btn.stop:active { background: #ff0000; }
    .teleop-btn.empty  { visibility: hidden; }

    /* Autonomy buttons */
    .auto-controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .start-btn {
      padding: 16px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #00cc44;
      color: #fff;
    }

    .start-btn:hover { background: #00ff55; }

    .abort-btn {
      padding: 16px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #cc2200;
      color: #fff;
    }

    .abort-btn:hover { background: #ff3300; }

    .estop-btn {
      padding: 20px;
      font-size: 22px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #ff0000;
      color: #fff;
      width: 100%;
      margin-top: 10px;
      letter-spacing: 2px;
    }

    .estop-btn:hover { background: #ff4444; }

    /* Hidden panel */
    .hidden { display: none; }

    /* Keyboard hint */
    .hint {
      text-align: center;
      color: #888;
      font-size: 13px;
      margin-top: 8px;
    }
  </style>
</head>

<body>

  <h1>🌙 Lunabot Dashboard</h1>

  <p id="status" class="status disconnected">Connecting to ROS2...</p>

  <!-- Mode selector -->
  <div class="mode-bar">
    <button class="mode-btn manual active" onclick="setMode('manual')">
      🕹️ Manual
    </button>
    <button class="mode-btn autonomous" onclick="setMode('autonomous')">
      🤖 Autonomous
    </button>
  </div>

  <!-- Mission state banner -->
  <div class="mission-banner" id="mission-state">
    IDLE
  </div>

  <!-- Stats grid -->
  <div class="grid">

    <!-- Robot state -->
    <div class="panel">
      <h3>Robot State</h3>
      <div class="stat">X Position <span id="pos-x">0.00</span> m</div>
      <div class="stat">Y Position <span id="pos-y">0.00</span> m</div>
      <div class="stat">Speed <span id="vel-x">0.00</span> m/s</div>
      <div class="stat">Closest Object <span id="closest-obj">---</span> m</div>
      <div class="stat">Mode <span id="mode-display">MANUAL</span></div>
    </div>

    <!-- Controls -->
    <div class="panel">
      <h3>Controls</h3>

      <!-- Manual controls -->
      <div id="manual-panel">
        <div class="teleop-grid">
          <div class="teleop-btn empty"></div>
          <button class="teleop-btn" onmousedown="sendVelocity(0.3,0)" onmouseup="sendVelocity(0,0)">▲</button>
          <div class="teleop-btn empty"></div>
          <button class="teleop-btn" onmousedown="sendVelocity(0,0.5)" onmouseup="sendVelocity(0,0)">◀</button>
          <button class="teleop-btn stop" onclick="sendVelocity(0,0)">■</button>
          <button class="teleop-btn" onmousedown="sendVelocity(0,-0.5)" onmouseup="sendVelocity(0,0)">▶</button>
          <div class="teleop-btn empty"></div>
          <button class="teleop-btn" onmousedown="sendVelocity(-0.3,0)" onmouseup="sendVelocity(0,0)">▼</button>
          <div class="teleop-btn empty"></div>
        </div>
        <p class="hint">W/A/S/D or buttons — hold to move</p>
      </div>

      <!-- Autonomous controls -->
      <div id="auto-panel" class="hidden auto-controls">
        <button class="start-btn" onclick="startMission()">▶ Start Mission</button>
        <button class="abort-btn" onclick="abortMission()">✕ Abort Mission</button>
        <p class="hint">Robot will drive to target and return home</p>
      </div>

      <!-- E-STOP always visible -->
      <button class="estop-btn" onclick="eStop()">⚠ E-STOP</button>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/roslib/build/roslib.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
